openapi: 3.0.3
info:
  title: Current Account - Unified API
  version: 1.0.0
  description: |
    BIAN-like current account capability unified microservice.
    Manages Customers, Accounts and Movements in a single domain.
servers:
  - url: /api/v1
tags:
  - name: Customers
  - name: Accounts
  - name: Movements
  - name: Reports
paths:
  /customers/login:
    post:
      operationId: login
      tags: [Customers]
      summary: Customer login
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestDto'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponseDto'
        '401':
          description: Unauthorized - Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModelDto'
        '500':
          $ref: '#/components/responses/InternalError'
  /customers:
    get:
      operationId: listCustomers
      tags: [Customers]
      summary: List customers
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - name: customerId
          in: query
          schema:
            type: string
            format: uuid
        - name: identification
          in: query
          schema:
            type: string
            maxLength: 20
        - name: status
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerDto'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createCustomer
      tags: [Customers]
      summary: Create customer
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequestDto'
      responses:
        '201':
          description: Customer created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalError'
  /customers/{customerId}:
    get:
      operationId: getCustomerById
      tags: [Customers]
      summary: Get customer by id
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
      responses:
        '200':
          description: Customer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDto'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replaceCustomer
      tags: [Customers]
      summary: Replace customer
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdateRequestDto'
      responses:
        '204':
          description: Customer updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchCustomer
      tags: [Customers]
      summary: Patch customer
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerPatchRequestDto'
      responses:
        '204':
          description: Customer patched
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteCustomer
      tags: [Customers]
      summary: Delete customer (logical)
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
      responses:
        '204':
          description: Customer deactivated
        '404':
          $ref: '#/components/responses/NotFound'
  /customers/{customerId}/accounts:
    get:
      operationId: listAccountsByCustomer
      tags: [Accounts]
      summary: List accounts by customer
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /customers/{customerId}/accounts/{accountId}/movements:
    get:
      operationId: listMovementsByCustomerAndAccount
      tags: [Movements]
      summary: List movements by customer and account
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/CustomerIdPath'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: Movement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts:
    get:
      operationId: listAccounts
      tags: [Accounts]
      summary: List accounts
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
        - name: clientId
          in: query
          schema:
            type: string
            format: uuid
        - name: accountNumber
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Account list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDto'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createAccount
      tags: [Accounts]
      summary: Create account
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreateRequestDto'
      responses:
        '201':
          description: Account created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalError'
  /accounts/{accountId}:
    get:
      operationId: getAccountById
      tags: [Accounts]
      summary: Get account by id
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: Account found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDto'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replaceAccount
      tags: [Accounts]
      summary: Replace account
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequestDto'
      responses:
        '204':
          description: Account replaced
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchAccount
      tags: [Accounts]
      summary: Patch account
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/AccountIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountPatchRequestDto'
      responses:
        '204':
          description: Account patched
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAccount
      tags: [Accounts]
      summary: Delete account (logical)
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '204':
          description: Account deactivated
        '404':
          $ref: '#/components/responses/NotFound'
  /accounts/{accountId}/movements:
    get:
      operationId: listMovementsByAccount
      tags: [Movements]
      summary: List movements by account
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/AccountIdPath'
      responses:
        '200':
          description: Movement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementDto'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /movements:
    get:
      operationId: listMovements
      tags: [Movements]
      summary: List movements
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - name: accountId
          in: query
          schema:
            type: string
            format: uuid
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          schema:
            type: string
            format: date
        - name: movementType
          in: query
          schema:
            type: string
            enum: [DEPOSIT, WITHDRAWAL]
      responses:
        '200':
          description: Movement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementDto'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createMovement
      tags: [Movements]
      summary: Create movement
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementCreateRequestDto'
      responses:
        '201':
          description: Movement created
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalError'
  /movements/{movementId}:
    get:
      operationId: getMovementById
      tags: [Movements]
      summary: Get movement by id
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/MovementId'
      responses:
        '200':
          description: Movement found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementDto'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: replaceMovement
      tags: [Movements]
      summary: Replace movement
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/MovementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementUpdateRequestDto'
      responses:
        '204':
          description: Movement updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: patchMovement
      tags: [Movements]
      summary: Patch movement
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/MovementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementPatchRequestDto'
      responses:
        '204':
          description: Movement patched
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteMovement
      tags: [Movements]
      summary: Delete movement (logical)
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - $ref: '#/components/parameters/MovementId'
      responses:
        '204':
          description: Movement removed
        '404':
          $ref: '#/components/responses/NotFound'
  /reports/account-statement:
    get:
      operationId: getAccountStatementReport
      tags: [Reports]
      summary: Get account statement report
      parameters:
        - $ref: '#/components/parameters/XGuid'
        - $ref: '#/components/parameters/XApp'
        - name: customerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: format
          in: query
          schema:
            type: string
            enum: [json, pdf]
            default: json
      responses:
        '200':
          description: Report data or file
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AccountStatementReportDto'
                  - $ref: '#/components/schemas/ReportBase64Dto'
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    XGuid:
      name: x-guid
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XApp:
      name: x-app
      in: header
      required: true
      schema:
        type: string
        maxLength: 50
    CustomerIdPath:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountIdPath:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MovementId:
      name: movementId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModelDto'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModelDto'
    ConflictError:
      description: Business conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModelDto'
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModelDto'
  schemas:
    PersonBaseDto:
      type: object
      required: [name, gender, age, identification, address, phone, email]
      properties:
        name:
          type: string
          maxLength: 120
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        age:
          type: integer
          minimum: 0
          maximum: 130
        identification:
          type: string
          maxLength: 20
        address:
          type: string
          maxLength: 180
        phone:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 120
    LoginRequestDto:
      type: object
      required: [identification, password]
      properties:
        identification:
          type: string
          maxLength: 20
        password:
          type: string
          maxLength: 20
    LoginResponseDto:
      type: object
      properties:
        customerId:
          type: string
          format: uuid
        fullName:
          type: string
        identification:
          type: string
        role:
          type: string
          example: "USER"
    CustomerDto:
      allOf:
        - $ref: '#/components/schemas/PersonBaseDto'
        - type: object
          required: [customerId, password, status]
          properties:
            customerId:
              type: string
              format: uuid
            password:
              type: string
              minLength: 8
              maxLength: 120
            status:
              type: boolean
            role:
              type: string
              example: "USER"
    CustomerCreateRequestDto:
      allOf:
        - $ref: '#/components/schemas/PersonBaseDto'
        - type: object
          required: [password, status]
          properties:
            password:
              type: string
              minLength: 8
              maxLength: 120
            status:
              type: boolean
            role:
              type: string
              example: "USER"
    CustomerUpdateRequestDto:
      allOf:
        - $ref: '#/components/schemas/PersonBaseDto'
        - type: object
          required: [password, status]
          properties:
            password:
              type: string
              minLength: 8
              maxLength: 120
            status:
              type: boolean
            role:
              type: string
              example: "USER"
    CustomerPatchRequestDto:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        gender:
          type: string
          enum: [MALE, FEMALE, OTHER]
        age:
          type: integer
          minimum: 0
          maximum: 130
        identification:
          type: string
          maxLength: 20
        address:
          type: string
          maxLength: 180
        phone:
          type: string
          maxLength: 20
        password:
          type: string
          minLength: 8
          maxLength: 120
        status:
          type: boolean
        role:
          type: string
          example: "USER"
    AccountDto:
      type: object
      required: [accountId, clientId, accountNumber, accountType, initialBalance, status]
      properties:
        accountId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        accountNumber:
          type: string
          maxLength: 40
        accountType:
          type: string
          enum: [SAVINGS, CURRENT]
        initialBalance:
          type: number
          format: double
          minimum: 0
        status:
          type: boolean
    AccountCreateRequestDto:
      type: object
      required: [clientId, accountNumber, accountType, initialBalance, status]
      properties:
        accountId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        accountNumber:
          type: string
          maxLength: 40
        accountType:
          type: string
          enum: [SAVINGS, CURRENT]
        initialBalance:
          type: number
          format: double
          minimum: 0
        status:
          type: boolean
    AccountUpdateRequestDto:
      type: object
      required: [accountType, status]
      properties:
        accountType:
          type: string
          enum: [SAVINGS, CURRENT]
        status:
          type: boolean
    AccountPatchRequestDto:
      type: object
      properties:
        accountType:
          type: string
          enum: [SAVINGS, CURRENT]
        status:
          type: boolean
    MovementDto:
      type: object
      required: [movementId, accountId, movementDate, movementType, amount, balance, status]
      properties:
        movementId:
          type: string
          format: uuid
        accountId:
          type: string
          format: uuid
        movementDate:
          type: string
          format: date-time
        movementType:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        amount:
          type: number
          format: double
        balance:
          type: number
          format: double
        status:
          type: boolean
        description:
          type: string
          maxLength: 100
          example: Payment for services
    MovementCreateRequestDto:
      type: object
      required: [accountId, movementDate, movementType, amount]
      properties:
        accountId:
          type: string
          format: uuid
        movementDate:
          type: string
          format: date-time
        movementType:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        amount:
          type: number
          format: double
        description:
          type: string
          maxLength: 100
          example: Payment for services
    MovementUpdateRequestDto:
      type: object
      required: [movementDate, movementType, amount, status]
      properties:
        movementDate:
          type: string
          format: date-time
        movementType:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        amount:
          type: number
          format: double
        status:
          type: boolean
        description:
          type: string
          maxLength: 100
          example: Payment for services
    MovementPatchRequestDto:
      type: object
      properties:
        movementDate:
          type: string
          format: date-time
        movementType:
          type: string
          enum: [DEPOSIT, WITHDRAWAL]
        amount:
          type: number
          format: double
        status:
          type: boolean
        description:
          type: string
          maxLength: 100
          example: Payment for services
    ErrorModelDto:
      type: object
      required: [title, detail, instance, type]
      properties:
        title:
          type: string
          maxLength: 50
          example: Bad Request
        detail:
          type: string
          maxLength: 120
          example: Validation error in request payload
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorListDto'
        instance:
          type: string
          maxLength: 50
          example: '0188'
        type:
          type: string
          maxLength: 100
          example: /api/v1
        resource:
          type: string
          example: Controller/Method
        component:
          type: string
          example: TX-ACC-001
        backend:
          type: string
          example: '00045'
    ErrorListDto:
      type: object
      properties:
        code:
          type: string
          example: ERR-001
        message:
          type: string
          example: Technical validation error
        businessMessage:
          type: string
          example: Error detail
    AccountStatementReportDto:
      type: object
      properties:
        client:
          $ref: '#/components/schemas/CustomerDto'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountStatementItemDto'
        totalGeneralDebits:
          type: number
          format: double
        totalGeneralCredits:
          type: number
          format: double
    AccountStatementItemDto:
      type: object
      properties:
        accountNumber:
          type: string
        accountType:
          type: string
        initialBalance:
          type: number
          format: double
        status:
          type: boolean
        movements:
          type: array
          items:
            $ref: '#/components/schemas/MovementDto'
    ReportBase64Dto:
      type: object
      properties:
        fileName:
          type: string
        contentType:
          type: string
        base64:
          type: string