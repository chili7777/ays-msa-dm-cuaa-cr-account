spring:
  application:
    name: ays-msa-dm-cuaa-cr-account
  profiles:
    active: ${AYS_MSA_CR_ACCOUNT_PROFILE:default}
  datasource:
    url: ${DB_URL:${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        dialect: ${DB_DIALECT:}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${AYS_MSA_CR_ACCOUNT_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}